{% extends 'encyclopedia/layout.html' %}
{% load static %}
{% block title %}
    Edit {{ title }}
{% endblock %}

{% block body %}
    <div class="form">
        <form action="{% url 'edit' title %}" method="POST">
            {% csrf_token %}
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" value="{{ title }}" required><br><br>
            <label for="content">Content:</label><br>
            <textarea id="content" name="content" rows="10" cols="50" required>{{ content|safe }}</textarea><br><br>
            <input type="submit" value="Edit Page">
        </form>
    </div>
{% endblock %}
